services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: autoservice
      POSTGRES_USER: app
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d autoservice"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ./CSTune
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=autoservice;Username=app;Password=pass;SslMode=Disable
    ports:
      - "8080:80"

volumes:
  pgdata:
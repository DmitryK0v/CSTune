version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=autoservice
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=autoservice;Username=app;Password=pass;SslMode=Disable
    ports:
      - "8080:80"

volumes:
  pgdata: